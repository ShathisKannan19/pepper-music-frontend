name: Deploy to shadowctrl - K3s

on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Build application
        run: yarn build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and tag Docker image
        run: |
          docker build -t mrbot-frontend:${{ github.sha }} .
          docker save mrbot-frontend:${{ github.sha }} > image.tar

      - name: Copy Docker image to K3s server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.K3S_SERVER_HOST }}
          username: ${{ secrets.K3S_SERVER_USERNAME }}
          key: ${{ secrets.K3S_SERVER_SSH_KEY }}
          port: ${{ secrets.K3S_SERVER_SSH_PORT }}
          source: 'image.tar'
          target: '/tmp'

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K3S_SERVER_HOST }}
          username: ${{ secrets.K3S_SERVER_USERNAME }}
          key: ${{ secrets.K3S_SERVER_SSH_KEY }}
          port: ${{ secrets.K3S_SERVER_SSH_PORT }}
          script: |
            # Load the Docker image into the local repository
            docker load < /tmp/image.tar

            # Tag the image for your local registry if needed
            docker tag mrbot-frontend:${{ github.sha }} 192.168.0.103:5000/mrbot-frontend:${{ github.sha }}

            # Push to local registry if you're using one
            docker push 192.168.0.103:5000/mrbot-frontend:${{ github.sha }}

            # Update the deployment.yaml with the new image tag
            sed -i "s|\${DOCKER_IMAGE}:\${TAG}|192.168.0.103:5000/nextjs-app:${{ github.sha }}|g" k3s/deployment.yaml

            # Apply the updated manifests
            kubectl apply -f k3s/deployment.yaml
            kubectl apply -f k3s/service.yaml

            # Verify deployment status
            kubectl rollout status deployment/mrbot-frontend

            # Clean up
            rm /tmp/image.tar
