name: Deploy to K3s
on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Create .env file from secrets
      - name: Create .env file
        run: |
          echo "# Environment variables for Next.js" > .env
          echo "NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}" >> .env
          echo "BACKEND_API_ENDPOINT=${{ secrets.BACKEND_API_ENDPOINT }}" >> .env
          echo "BACKEND_API_SECRET=${{ secrets.BACKEND_API_SECRET }}" >> .env
          echo "BACKEND_MUSIC_ENDPOINT=${{ secrets.BACKEND_MUSIC_ENDPOINT }}" >> .env
          echo "CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}" >> .env
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env

      # Build Docker image with environment variables
      - name: Build Docker image for ARM
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/arm64
          tags: mrbot-frontend:latest
          outputs: type=docker,dest=image.tar
          build-args: |
            TARGETPLATFORM=linux/arm64
            NEXT_PUBLIC_BASE_URL=${{ secrets.NEXT_PUBLIC_BASE_URL }}
            BACKEND_API_ENDPOINT=${{ secrets.BACKEND_API_ENDPOINT }}
            BACKEND_API_SECRET=${{ secrets.BACKEND_API_SECRET }}

      - name: Copy Docker image to K3s server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.K3S_SERVER_HOST }}
          username: ${{ secrets.K3S_SERVER_USERNAME }}
          key: ${{ secrets.K3S_SERVER_SSH_KEY }}
          port: ${{ secrets.K3S_SERVER_SSH_PORT }}
          source: 'image.tar'
          target: '/tmp'

      - name: Copy YAML files to K3s server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.K3S_SERVER_HOST }}
          username: ${{ secrets.K3S_SERVER_USERNAME }}
          key: ${{ secrets.K3S_SERVER_SSH_KEY }}
          port: ${{ secrets.K3S_SERVER_SSH_PORT }}
          source: 'k3s/*'
          target: '/home/${{ secrets.K3S_SERVER_USERNAME }}'
          strip_components: 1

      - name: Create ConfigMap YAML
        run: |
          cat > nextjs-env-configmap.yaml << EOF
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: mrbotz-frontend-env-config
          data:
            NEXT_PUBLIC_BASE_URL: "${{ secrets.NEXT_PUBLIC_BASE_URL }}"
            BACKEND_API_ENDPOINT: "${{ secrets.BACKEND_API_ENDPOINT }}"
            BACKEND_API_SECRET: "${{ secrets.BACKEND_API_SECRET }}"
          EOF

      - name: Copy ConfigMap to K3s server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.K3S_SERVER_HOST }}
          username: ${{ secrets.K3S_SERVER_USERNAME }}
          key: ${{ secrets.K3S_SERVER_SSH_KEY }}
          port: ${{ secrets.K3S_SERVER_SSH_PORT }}
          source: 'nextjs-env-configmap.yaml'
          target: '/home/${{ secrets.K3S_SERVER_USERNAME }}/k3s/'

      - name: Copy YAML files to K3s server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.K3S_SERVER_HOST }}
          username: ${{ secrets.K3S_SERVER_USERNAME }}
          key: ${{ secrets.K3S_SERVER_SSH_KEY }}
          port: ${{ secrets.K3S_SERVER_SSH_PORT }}
          source: 'k3s/*'
          target: '/home/${{ secrets.K3S_SERVER_USERNAME }}/k3s/'
          strip_components: 1

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.K3S_SERVER_HOST }}
          username: ${{ secrets.K3S_SERVER_USERNAME }}
          key: ${{ secrets.K3S_SERVER_SSH_KEY }}
          port: ${{ secrets.K3S_SERVER_SSH_PORT }}
          script: |
            # Ensure the directory exists
            mkdir -p /home/${{ secrets.K3S_SERVER_USERNAME }}/k3s

            # Load the Docker image into the local repository
            sudo docker load < /tmp/image.tar

            # Get the actual image ID after loading
            IMAGE_ID=$(sudo docker images --format "{{.Repository}}:{{.Tag}}" | grep "mrbot-frontend" | head -n 1)
            echo "Using image ID: $IMAGE_ID"

            # Tag the image for your local registry
            sudo docker tag $IMAGE_ID 192.168.0.103:5000/mrbot-frontend:latest

            # Push to local registry
            sudo docker push 192.168.0.103:5000/mrbot-frontend:latest

            # Apply the ConfigMap
            sudo kubectl apply -f /home/${{ secrets.K3S_SERVER_USERNAME }}/k3s/nextjs-env-configmap.yaml

            # Update the deployment.yaml with the new image tag
            sudo sed -i "s|\${DOCKER_IMAGE}:\${TAG}|192.168.0.103:5000/mrbot-frontend:latest|g" /home/${{ secrets.K3S_SERVER_USERNAME }}/k3s/deployment.yaml

            # Apply the updated manifests
            sudo kubectl apply -f /home/${{ secrets.K3S_SERVER_USERNAME }}/k3s/deployment.yaml
            sudo kubectl apply -f /home/${{ secrets.K3S_SERVER_USERNAME }}/k3s/service.yaml

            # Force a restart of the deployment to ensure it picks up the new image
            sudo kubectl rollout restart deployment/mrbot-frontend

            # Verify deployment status
            sudo kubectl rollout status deployment/mrbot-frontend

            # Clean up
            sudo rm /tmp/image.tar
